apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Harish9957/rag-lab.git
    targetRevision: main
    path: k8s
    directory:
      include: '{namespace.yaml,chromadb.yaml,bedrock.yaml,rag-app.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
