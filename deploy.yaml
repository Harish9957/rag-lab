apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-app
  template:
    metadata:
      labels:
        app: rag-app
    spec:
      containers:
      - name: web
        image: nginx:latest # Or replace with an AI-related image later
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: default
spec:
  selector:
    app: rag-app
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: rag.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rag-service
            port:
              number: 80
