apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-app-ingress
  namespace: default
  annotations:
    # This is the magic line that strips the prefix
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: rag-lab.local
    http:
      paths:
      - path: /qdrant(/|$)(.*)  # Captures everything after /qdrant into $2
        pathType: ImplementationSpecific
        backend:
          service:
            name: qdrant
            port:
              number: 6333
      - path: /(.*)            # Your RAG engine (if needed)
        pathType: ImplementationSpecific
        backend:
          service:
            name: rag-engine
            port:
              number: 8000
